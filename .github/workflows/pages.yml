name: Build and Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/PhotographyHub/pages/MASTER-steps.txt
      - docs/PhotographyHub/tools/hub_tools.html
      - scripts/build_pages_from_master.sh
      - scripts/validate_site_links.sh
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site from MASTER-steps
        run: ./scripts/build_pages_from_master.sh

      - name: Validate internal links
        run: ./scripts/validate_site_links.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
